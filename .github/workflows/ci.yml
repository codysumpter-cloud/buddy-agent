name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Capture mypy diagnostics
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -e .[dev] --quiet
          mypy src > mypy-output.txt || true
          cat mypy-output.txt

      - name: Upload mypy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-output
          path: mypy-output.txt

      - name: Fail on mypy diagnostics
        run: test ! -s mypy-output.txt
