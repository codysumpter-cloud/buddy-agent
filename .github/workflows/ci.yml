name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip --quiet && python -m pip install -e .[dev] --quiet
      - name: Lint
        run: ruff check src tests --output-format=concise
      - name: Type check
        run: mypy src
      - name: Validate public skills
        run: buddy skills validate
      - name: Test
        run: pytest
