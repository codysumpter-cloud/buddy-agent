name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Lint diagnostic
        run: |
          python -m pip install ruff==0.8.6 --quiet
          ruff check src tests --output-format=concise
