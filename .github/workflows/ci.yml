name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -e .[dev] --quiet

      - name: Lint
        run: ruff check src tests --output-format=concise

      - name: Type check
        run: mypy src

      - name: Test
        run: pytest
