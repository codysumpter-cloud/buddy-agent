name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Capture Ruff diagnostics
        run: |
          python -m pip install ruff==0.8.6 --quiet
          ruff check src tests --output-format=concise > ruff-output.txt || true
          cat ruff-output.txt

      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt

      - name: Fail on Ruff diagnostics
        run: test ! -s ruff-output.txt
