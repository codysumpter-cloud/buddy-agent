<svg xmlns="http://www.w3.org/2000/svg" width="280" height="38" viewBox="0 0 280 38" role="img" aria-labelledby="title desc">
  <title id="title">Runtime runnable alpha</title>
  <desc id="desc">Buddy Agent runtime status badge.</desc>
  <style>
    .label{fill:#3f3f46}.value{fill:#22c55e}.text{font:700 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.8px;fill:#fff}.dot{fill:#bbf7d0}.pulse{fill:#bbf7d0;opacity:.35;animation:pulse 1.5s infinite ease-in-out;transform-origin:120px 19px}@keyframes pulse{0%,100%{transform:scale(.65);opacity:.25}50%{transform:scale(1);opacity:.65}}
  </style>
  <rect class="label" x="0" y="0" width="112" height="38" rx="8"/>
