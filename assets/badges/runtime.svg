  <style>.label{fill:#3f3f46}.value{fill:#22c55e}.text{font:700 12.5px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.5px;fill:#fff}.dot{fill:#bbf7d0}.pulse{fill:#bbf7d0;opacity:.35;animation:pulse 1.5s infinite ease-in-out;transform-origin:132px 19px}@keyframes pulse{0%,100%{transform:scale(.65);opacity:.25}50%{transform:scale(1);opacity:.65}}</style>
