<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" role="img" aria-labelledby="title desc">
<title id="title">Buddy Agent ASCII mascot</title>
<desc id="desc">Animated ASCII Buddy mascot with animated Buddy Agent text.</desc>
<style>
.txt{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:800}.head{font-size:25px;letter-spacing:2px;fill:#12184f;animation:glow 2s ease-in-out infinite}.sub{font-size:12px;fill:#5fc8c5}.art{font-size:12px;fill:#12184f;white-space:pre}.blink{animation:blink 1s steps(1,end) infinite}.bob{animation:bob 2.2s ease-in-out infinite}@media (prefers-color-scheme:dark){.head,.art{fill:#bffff5}.sub{fill:#7fe7df}}@keyframes glow{0%,100%{opacity:.82}50%{opacity:1}}@keyframes blink{50%{opacity:0}}@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</style>
<text class="txt head" x="180" y="34" text-anchor="middle">BUDDY AGENT<tspan class="blink">_</tspan></text>
<text class="txt sub" x="180" y="54" text-anchor="middle">..... heart .....  alpha runtime</text>
<g class="bob">
<text class="txt art" x="76" y="82" xml:space="preserve">
<tspan x="76">        .vv.          .vv.</tspan>
<tspan x="76" dy="14">      .'    '.      .'    '.</tspan>
<tspan x="76" dy="14">     /  o  o \____/ o  o  \</tspan>
<tspan x="76" dy="14">     \  ..  /    \  ..  /</tspan>
<tspan x="76" dy="14">       '--'  .----. '--'</tspan>
<tspan x="76" dy="14">          .-'      '-.</tspan>
<tspan x="76" dy="14">        .'  .------.  '.</tspan>
<tspan x="76" dy="14">       /   | o    o |   \</tspan>
<tspan x="76" dy="14">   o  |    |   __   |    |  o</tspan>
<tspan x="76" dy="14">      |    '---vv---'    |</tspan>
<tspan x="76" dy="14">       \      ----      /</tspan>
<tspan x="76" dy="14">        '.            .'</tspan>
<tspan x="76" dy="14">          '--.____.--'</tspan>
<tspan x="76" dy="14">             d    b</tspan>
</text>
</g>
<text class="txt sub" x="180" y="244" text-anchor="middle">&gt; idle / happy / thinking / sleepy</text>
</svg>
