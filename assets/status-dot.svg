<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" role="img" aria-labelledby="title desc">
  <title id="title">Runtime status online</title>
  <desc id="desc">Animated green status dot for Buddy Agent version tracker.</desc>
  <style>
    .ring{fill:#22c55e;opacity:.25;animation:pulse 1.6s infinite ease-in-out;transform-origin:7px 7px}.dot{fill:#22c55e}@keyframes pulse{0%,100%{transform:scale(.75);opacity:.2}50%{transform:scale(1);opacity:.55}}
  </style>
  <circle class="ring" cx="7" cy="7" r="7"/>
  <circle class="dot" cx="7" cy="7" r="4"/>
</svg>
